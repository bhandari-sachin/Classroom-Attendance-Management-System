services:
  db:
    image: mysql:8.4
    container_name: attendance-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: classroom_attendance
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u db_user -pdb_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    image: sachinbhandari/classroom-attendance-backend:latest
    container_name: attendance-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://db:3306/classroom_attendance?serverTimezone=UTC
      DB_USERNAME: db_user
      DB_PASSWORD: db_password

  frontend:
    image: sachinbhandari/classroom-attendance-frontend:latest
    container_name: attendance-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8081
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}

volumes:
  mysql_data:
